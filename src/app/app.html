<div class="alignCenter">
 <h2>Lunch planner</h2>
</div>
<div>
  <input type="text" [(ngModel)]="newItem.name" placeholder="Enter lunch item">
  <input type="text" [(ngModel)]="newItem.calories" placeholder="Calorie of item">
  <button ((keypress))="addItemToList()">Add Lunch</button>
 
</div>
 <app-lunch-list [lunchItemsArray]="lunchItems()" (lunchChange)="updatedItems($event)"></app-lunch-list>
<div class="alignCenter">
  <h4>Total number of Lunch Items:{{lunchItems().length}}</h4>
  <h3>Total Calories:{{totalCalories()}}</h3>
</div>
