<div class="alignCenter">
 <h2>Lunch planner</h2>
</div>
<form (ngSubmit)="addItemToList()">
<div>
  <input type="text" [(ngModel)]="newItem.name" placeholder="Enter lunch item" name="newItemName">
  <input type="text" [(ngModel)]="newItem.calories" placeholder="Calorie of item" name="newItemCalorie">
  <button type="submit">Add Lunch</button>
 
</div>
</form>
 <app-lunch-list [lunchItemsArray]="lunchItems()" (lunchChange)="updatedItems($event)"></app-lunch-list>
<div class="alignCenter">
  <h4>Total number of Lunch Items:{{lunchItems().length}}</h4>
  <h3>Total Calories:{{totalCalories()}}</h3>
</div>
